<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
    <defs>
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#1e293b"/>
            <stop offset="100%" stop-color="#0f172a"/>
        </linearGradient>
        <linearGradient id="greenTile" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#34d399"/>
            <stop offset="100%" stop-color="#059669"/>
        </linearGradient>
        <linearGradient id="yellowTile" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#fbbf24"/>
            <stop offset="100%" stop-color="#d97706"/>
        </linearGradient>
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="12" stdDeviation="15" flood-color="#000000" flood-opacity="0.6"/>
        </filter>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="8" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>

    <rect width="512" height="512" rx="115" fill="url(#bg)"/>

    <g filter="url(#shadow)" transform="translate(0, -10)">
        <rect x="130" y="270" width="115" height="115" rx="24" fill="#334155" stroke="#475569" stroke-width="4"/>
        
        <rect x="270" y="130" width="115" height="115" rx="24" fill="url(#yellowTile)"/>
        
        <rect x="130" y="130" width="115" height="115" rx="24" fill="url(#greenTile)"/>
        
        <rect x="270" y="270" width="115" height="115" rx="24" fill="url(#greenTile)"/>
    </g>

    <text x="256" y="375" font-family="Tajawal, sans-serif" font-size="220" font-weight="900" fill="#ffffff" text-anchor="middle" filter="url(#glow)">و</text>
</svg>
